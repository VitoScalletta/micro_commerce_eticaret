version: '3.8'

services:
  product-db:
    image: postgres:15
    container_name: product_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: product_db
    ports:
      - "5432:5432"

  order-db:
    image: postgres:15
    container_name: order_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: order_db
    ports:
      - "5433:5432"